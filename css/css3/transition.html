<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        background-color: red;
      }
      .box:hover {
        background-color: blue;
        border-radius: 50%;
        transition-property: all;
        transition-duration: 1s;
        transition-timing-function: linear;
        transition-delay: 0s;
      }

      .box2 {
        width: 100px;
        height: 100px;
        background-color: rgb(10, 155, 10);
        position: relative;
        top: 10px;
        left: 0;
      }
      .box2:hover {
        left: 50px;
        top: 50px;
        transition: all 1s;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <div class="box2"></div>
  </body>
</html>
