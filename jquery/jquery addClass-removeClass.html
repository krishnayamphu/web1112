<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jquery</title>
    <style>
      p {
        font-family: Arial, Helvetica, sans-serif;
        border: 1px solid red;
        margin: 15px 0;
        padding: 15px;
      }
      .my-content {
        background-color: teal;
        color: white;
      }
    </style>
  </head>
  <body>
    <button id="btn1">add class</button>
    <button id="btn2">remove class</button>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Velit ipsa
      quibusdam voluptatibus odio, corporis ratione exercitationem consequatur
      dolores saepe aut eius tenetur repudiandae hic atque quas eum illo maiores
      cumque.
    </p>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <script>
      $(document).ready(function () {
        $("#btn1").click(function () {
          $("p").addClass("my-content");
        });
        $("#btn2").click(function () {
          $("p").removeClass("my-content");
        });
      });
    </script>
  </body>
</html>
