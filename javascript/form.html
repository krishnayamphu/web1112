<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js</title>
  </head>
  <body>
    <form onsubmit="return valid()" name="f">
      <input type="text" name="username" placeholder="enter username" />
      <br /><br />
      <input type="password" name="password" placeholder="enter password" />
      <br /><br />
      <button>Submit</button>
    </form>
    <script>
      function valid() {
        let name = document.forms["f"].username.value;
        let password = document.forms["f"].password.value;
        if (name == "") {
          alert("username required");
          document.forms["f"].username.focus();
          return false;
        } else if (password == "") {
          alert("password required");
          document.forms["f"].password.focus();
          return false;
        } else if (name == "admin" && password == "a123") {
          alert("login success");
          return true;
        } else {
          alert("Invalid username or password");
          return false;
        }
      }
    </script>
  </body>
</html>
