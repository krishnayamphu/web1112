<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js</title>
  </head>
  <body>
    <input
      id="myrange"
      oninput="getValue()"
      type="range"
      min="0"
      max="100"
      value="50"
    />
    <span id="txtVal"></span>
    <script>
      function getValue() {
        let value = document.getElementById("myrange").value;
        document.getElementById("txtVal").innerHTML = value;
      }
    </script>
  </body>
</html>
