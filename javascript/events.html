<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js</title>
  </head>
  <body>
    <button onclick="setBgRed()">red</button>
    <button onclick="setText()">set content</button>
    <p id="mytext">hello</p>
    <script>
      function setBgRed() {
        document.bgColor = "red";
      }

      function setText() {
        document.getElementById("mytext").innerHTML = "Welcome";
      }
    </script>
  </body>
</html>
