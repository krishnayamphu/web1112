<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js</title>
  </head>
  <body>
    <script>
      function getPI() {
        return 3.14;
      }
      document.write("Value of PI: " + getPI());

      function sum(x, y) {
        document.write("<br>Total sum: " + (x + y));
      }

      sum(4, 5);
      sum(40, 5);
      sum(4, 50);
    </script>
  </body>
</html>
