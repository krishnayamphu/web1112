<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js</title>
  </head>
  <body>
    <script>
      const num = [100, 200, 300];
      document.write(num[2]);

      const color = new Array("red", "green", "blue");
      document.write(color[0]);
      document.write("<hr>");
      for (i = 0; i < 3; i++) {
        document.write(color[i] + "<br>");
      }
    </script>
  </body>
</html>
