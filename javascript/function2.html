<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js</title>
  </head>
  <body>
    <script>
      function getDiscount(amount, precentage) {
        return (amount * precentage) / 100;
      }

      document.write("Discount: " + getDiscount(1000, 5));
    </script>
  </body>
