<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>js</title>
  </head>
  <body>
    <script>
      let i = 1;
      while (i <= 5) {
        document.write("Hello World " + i + "<br>");
        i++;
      }

      let j = 1;
      let n = 2;
      while (j <= 10) {
        document.write(n + " x " + j + " = " + n * j + "<br>");
        j++;
      }
    </script>
  </body>
</html>
